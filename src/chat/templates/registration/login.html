<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
        :root {
            --bg: #060610;
            --panel: #0b0b1e;
            --surface: #07071a;
            --border: rgba(0,245,255,0.15);
            --text: #cce8ff;
            --muted: #3d6b7a;
            --cyan: #00f5ff;
            --pink: #ff00de;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            background-image:
                linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            font-family: "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            padding: 24px 16px;
        }

        .card {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 0 60px rgba(0,245,255,0.07);
            overflow: hidden;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 12%; right: 12%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
            box-shadow: 0 0 14px var(--cyan);
            pointer-events: none;
        }

        .card-header {
            padding: 28px 30px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,245,255,0.3), transparent);
            pointer-events: none;
        }
        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            border: 1.5px solid var(--cyan);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--cyan);
            box-shadow: 0 0 12px rgba(0,245,255,0.35), inset 0 0 10px rgba(0,245,255,0.07);
        }
        .brand-name {
            font-weight: 700;
            font-size: 0.88rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0,245,255,0.6);
        }
        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #fff;
        }
        .card-header p { font-size: 0.88rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.03em; }

        .card-body { padding: 24px 30px 28px; }

        form p { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 0.73rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 12px 14px;
            font-size: 0.95rem;
            outline: none;
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input::placeholder { color: var(--muted); }
        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 1px rgba(0,245,255,0.2), 0 0 14px rgba(0,245,255,0.12);
        }

        .btn-submit {
            width: 100%;
            margin-top: 6px;
            border: none;
            border-radius: 6px;
            padding: 13px;
            background: var(--cyan);
            color: #000;
            font-size: 0.93rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 22px rgba(0,245,255,0.55);
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .btn-submit:hover { box-shadow: 0 0 36px rgba(0,245,255,0.85); transform: translateY(-1px); }

        .errorlist {
            list-style: none;
            color: #ff6b6b;
            font-size: 0.83rem;
            margin: 3px 0 6px;
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 0.86rem;
            color: var(--muted);
        }
        .footer-link a { color: var(--cyan); font-weight: 700; text-decoration: none; }
        .footer-link a:hover { text-shadow: 0 0 8px var(--cyan); }
        .flash-notification { border-radius: 5px; padding: 10px 14px; font-size: 0.85rem; border: 1px solid; }
        .flash-notification.error { background: rgba(255,59,59,0.07); border-color: rgba(255,59,59,0.3); color: #ff6b6b; animation: error-glow 2s ease-in-out infinite; }
        @keyframes error-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,59,59,0.25); border-color: rgba(255,59,59,0.3); text-shadow: 0 0 4px rgba(255,59,59,0.4); }
            50%       { box-shadow: 0 0 18px rgba(255,59,59,0.75), 0 0 35px rgba(255,59,59,0.25); border-color: rgba(255,59,59,0.7); text-shadow: 0 0 12px rgba(255,107,107,0.95), 0 0 24px rgba(255,59,59,0.5); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="brand-row">
                <div class="brand-icon">&#9649;</div>
                <span class="brand-name">Chat Platform</span>
            </div>
            <h1>Welcome back</h1>
            <p>Sign in to your account</p>
        </div>
        {% if messages %}
        <div style="padding: 14px 30px 0;">
            {% for message in messages %}
            <div class="flash-notification {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn-submit" type="submit">Login &rarr;</button>
            </form>
            <p class="footer-link">No account? <a href="/signup/">Sign up for free</a></p>
        </div>
    </div>
    <script>
        document.querySelectorAll('.flash-notification').forEach(el => {
            setTimeout(() => {
                el.style.transition = 'opacity 0.8s ease';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 800);
            }, 6000);
        });
    </script>
</body>
</html>
