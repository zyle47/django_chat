<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
        :root {
            --bg: #f5fff9;
            --panel: #ffffff;
            --border: #cce8d9;
            --text: #132b21;
            --accent: #198754;
            --accent-strong: #13673f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 12% 8%, #d8f6e7 0%, transparent 40%),
                radial-gradient(circle at 88% 92%, #e4f7ff 0%, transparent 35%),
                var(--bg);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 16px 28px rgba(19, 43, 33, 0.1);
        }
        h1 { margin-top: 0; }
        form p { margin: 0 0 12px; }
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px;
            font-size: 1rem;
        }
        button {
            border: none;
            border-radius: 9px;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--accent-strong); }
        .errorlist {
            color: #b3261e;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Login</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <p><a href="/signup/">No account yet? Sign up</a></p>
    </main>
</body>
</html>
