{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'chat/css/login.css' %}" />
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="brand-row">
                <div class="brand-icon">&#9649;</div>
                <span class="brand-name">Chat Platform</span>
            </div>
            <h1>Welcome back!!!</h1>
            <p>Sign in to your account</p>
        </div>
        {% if messages %}
        <div style="padding: 14px 30px 0;">
            {% for message in messages %}
            <div class="flash-notification {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn-submit" type="submit">Login &rarr;</button>
            </form>
            <p class="footer-link">No account? <a href="/signup/">Sign up for free</a></p>
        </div>
    </div>
    <script src="{% static 'chat/js/login.js' %}"></script>
</body>
</html>
