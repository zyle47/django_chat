{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up</title>
    <link rel="stylesheet" href="{% static 'chat/css/signup.css' %}" />
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="brand-row">
                <div class="brand-icon">&#9649;</div>
                <span class="brand-name">Chat Platform</span>
            </div>
            <h1>Create account</h1>
            <p>Request access to the platform</p>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn-submit" type="submit">Sign up &rarr;</button>
            </form>
            <p class="footer-link">Already have an account? <a href="/accounts/login/">Login</a></p>
        </div>
    </div>
</body>
</html>
