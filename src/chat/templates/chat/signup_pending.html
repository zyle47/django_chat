<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Approval Pending</title>
    <style>
        :root {
            --bg: #f7f6ef;
            --panel: #ffffff;
            --border: #d9d5c8;
            --text: #22211a;
            --muted: #676254;
            --accent: #315bd6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 8% 10%, #e6efdc 0%, transparent 40%),
                radial-gradient(circle at 92% 90%, #dde7ff 0%, transparent 35%),
                var(--bg);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            padding: 20px;
        }
        .card {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 14px 28px rgba(34, 33, 26, 0.08);
        }
        h1 { margin-top: 0; }
        p { color: var(--muted); line-height: 1.45; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Account Created</h1>
        <p>
            Your registration is pending. 
            Please be patient while we review your information.
        </p>
        <p>
            You will be redirected to the homepage in
            <strong><span id="redirect-seconds">5</span>s</strong>.
        </p>
        <p><a href="/">Go now</a> | <a href="/accounts/login/">Back to login</a></p>
    </main>
    <script>
        let seconds = 5;
        const secondsEl = document.getElementById("redirect-seconds");

        const timer = setInterval(() => {
            seconds -= 1;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = "/";
                return;
            }
            secondsEl.textContent = String(seconds);
        }, 1000);
    </script>
</body>
</html>
