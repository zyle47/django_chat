{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Approval Pending</title>
    <link rel="stylesheet" href="{% static 'chat/css/signup_pending.css' %}" />
</head>
<body>
    <div class="card">
        <div class="card-top">
            <div class="orb">&#9203;</div>
            <h1>You&rsquo;re on the list</h1>
            <p>Your account has been created and is pending admin approval. Hang tight &mdash; you&rsquo;ll be able to log in once approved.</p>
        </div>
        <div class="card-body">
            <div class="countdown-bar">
                <span>Redirecting to homepage in</span>
                <strong><span id="redirect-seconds">5</span>s</strong>
            </div>
            <div class="actions">
                <a class="btn btn-primary" href="/">Go now</a>
                <a class="btn btn-secondary" href="/accounts/login/">Login page</a>
            </div>
        </div>
    </div>

    <script src="{% static 'chat/js/signup_pending.js' %}"></script>
</body>
</html>
