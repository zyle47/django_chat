name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'android/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'android/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for diff-cover

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Check for missing migrations
        working-directory: src
        env:
          SECRET_KEY: ci-dummy-key
          DEBUG: 'True'
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        working-directory: src
        env:
          SECRET_KEY: ci-dummy-key
          DEBUG: 'True'
        run: |
          coverage run manage.py test chat --verbosity=2
          coverage xml -o ../coverage.xml

      - name: Resolve compare ref
        id: compare
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=$(git rev-parse HEAD~1 2>/dev/null || echo HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Check diff coverage
        run: |
          diff-cover coverage.xml \
            --compare-branch=${{ steps.compare.outputs.ref }} \
            --src-roots=src \
            --fail-under=80
